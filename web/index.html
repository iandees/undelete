<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>OSM Undelete</title>
  <link rel="stylesheet" href="https://unpkg.com/maplibre-gl@4/dist/maplibre-gl.css">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; }
    #map { position: absolute; top: 0; left: 0; width: 100%; height: 100%; }

    .maplibregl-popup-content {
      max-width: 400px;
      max-height: 400px;
      overflow-y: auto;
      font-size: 13px;
    }
    .popup-title {
      font-weight: bold;
      font-size: 15px;
      margin-bottom: 6px;
    }
    .popup-meta {
      color: #666;
      margin-bottom: 8px;
      font-size: 12px;
    }
    .popup-meta a { color: #0078d4; }
    .tag-table {
      width: 100%;
      border-collapse: collapse;
      margin-bottom: 8px;
    }
    .tag-table td {
      padding: 2px 6px;
      border-bottom: 1px solid #eee;
      font-size: 12px;
    }
    .tag-table td:first-child {
      font-weight: 600;
      color: #444;
      white-space: nowrap;
    }
    .popup-actions {
      display: flex;
      gap: 6px;
      margin-top: 8px;
    }
    .popup-actions a, .popup-actions button {
      padding: 4px 10px;
      border-radius: 4px;
      font-size: 12px;
      text-decoration: none;
      cursor: pointer;
      border: 1px solid #ccc;
      background: #f5f5f5;
      color: #333;
    }
    .popup-actions a:hover, .popup-actions button:hover {
      background: #e0e0e0;
    }
    #status-bar {
      position: absolute;
      bottom: 8px;
      left: 8px;
      background: rgba(255,255,255,0.9);
      padding: 4px 10px;
      border-radius: 4px;
      font-size: 12px;
      color: #555;
      z-index: 1;
      pointer-events: none;
    }
  </style>
</head>
<body>

<div id="map"></div>
<div id="status-bar"></div>

<script src="https://unpkg.com/maplibre-gl@4/dist/maplibre-gl.js"></script>
<script src="https://unpkg.com/pmtiles@3/dist/pmtiles.js"></script>
<script>

// Register PMTiles protocol
const protocol = new pmtiles.Protocol();
maplibregl.addProtocol("pmtiles", protocol.tile);

const map = new maplibregl.Map({
  container: "map",
  style: {
    version: 8,
    sources: {
      osm: {
        type: "raster",
        tiles: ["https://tile.openstreetmap.org/{z}/{x}/{y}.png"],
        tileSize: 256,
        maxzoom: 19,
        attribution: '&copy; <a href="https://www.openstreetmap.org/copyright">OpenStreetMap</a> contributors',
      },
    },
    layers: [{ id: "osm", type: "raster", source: "osm" }],
  },
  center: [0, 30],
  zoom: 2,
});

map.addControl(new maplibregl.NavigationControl(), "top-right");

const DELETE_COLOR = "#e74c3c";
const TODAY_COLOR = "#e67e22";
const loadedSources = new Set();

map.on("load", () => {
  const base = window.location.origin;
  fetch(base + "/manifest.json")
    .then(r => r.ok ? r.json() : null)
    .then(manifest => {
      if (!manifest) return;

      const today = new Date().toISOString().slice(0, 10);
      for (const file of manifest.files) {
        const date = file.replace(".pmtiles", "");
        const sourceId = `deletions-${date}`;
        const color = date === today ? TODAY_COLOR : DELETE_COLOR;
        addPMTilesSource(sourceId, `${base}/${file}`, color);
      }

      const updated = new Date(manifest.last_updated);
      const oldest = manifest.files[0].replace(".pmtiles", "");
      const newest = manifest.files[manifest.files.length - 1].replace(".pmtiles", "");
      const bar = document.getElementById("status-bar");
      bar.textContent = `Last updated: ${updated.toLocaleString()} · Data from ${oldest} to ${newest}`;
    })
    .catch(() => {});
});

function addPMTilesSource(sourceId, url, color) {
  map.addSource(sourceId, {
    type: "vector",
    url: `pmtiles://${url}`,
  });
  loadedSources.add(sourceId);
  addDeletionLayers(sourceId, color);
}

function addDeletionLayers(sourceId, color) {
  map.addLayer({
    id: sourceId + "-polygons",
    type: "fill",
    source: sourceId,
    "source-layer": "deletions",
    filter: ["==", "$type", "Polygon"],
    paint: {
      "fill-color": color,
      "fill-opacity": 0.3,
      "fill-outline-color": color,
    },
  });

  map.addLayer({
    id: sourceId + "-lines",
    type: "line",
    source: sourceId,
    "source-layer": "deletions",
    filter: ["==", "$type", "LineString"],
    paint: {
      "line-color": color,
      "line-width": 2,
    },
  });

  map.addLayer({
    id: sourceId + "-points",
    type: "circle",
    source: sourceId,
    "source-layer": "deletions",
    filter: ["==", "$type", "Point"],
    paint: {
      "circle-radius": 5,
      "circle-color": color,
      "circle-stroke-width": 1,
      "circle-stroke-color": "#fff",
    },
  });
}

// Click handler for popups
function getClickableLayers() {
  const layers = [];
  for (const sourceId of loadedSources) {
    layers.push(sourceId + "-points", sourceId + "-lines", sourceId + "-polygons");
  }
  return layers;
}

map.on("click", (e) => {
  const features = map.queryRenderedFeatures(e.point, { layers: getClickableLayers().filter((l) => map.getLayer(l)) });
  if (features.length === 0) return;

  const f = features[0];
  const props = f.properties;
  const osmType = props.osm_type;
  const osmId = props.osm_id;

  // Parse tags — may be a JSON string
  let tags = props.tags;
  if (typeof tags === "string") {
    try { tags = JSON.parse(tags); } catch { tags = {}; }
  }
  tags = tags || {};

  // Build popup
  let html = `<div class="popup-title">${osmType}/${osmId}</div>`;
  html += `<div class="popup-meta">`;
  html += `Deleted <strong>${props.deleted_at || "unknown"}</strong>`;
  html += ` by <a href="https://www.openstreetmap.org/user/${encodeURIComponent(props.deleted_by)}" target="_blank">${props.deleted_by || "unknown"}</a>`;
  html += ` in <a href="https://www.openstreetmap.org/changeset/${props.deleted_changeset}" target="_blank">changeset ${props.deleted_changeset}</a>`;
  html += `</div>`;

  // Tags table
  const tagEntries = Object.entries(tags);
  if (tagEntries.length > 0) {
    html += `<table class="tag-table">`;
    for (const [k, v] of tagEntries) {
      html += `<tr><td>${escapeHtml(k)}</td><td>${escapeHtml(v)}</td></tr>`;
    }
    html += `</table>`;
  } else {
    html += `<p style="color:#999;font-size:12px;">No tags</p>`;
  }

  // Actions
  const center = getFeatureCenter(f);
  const josmUrl = `http://localhost:8111/load_and_zoom?left=${center[0] - 0.001}&right=${center[0] + 0.001}&bottom=${center[1] - 0.001}&top=${center[1] + 0.001}`;

  html += `<div class="popup-actions">`;
  html += `<a href="https://www.openstreetmap.org/${osmType}/${osmId}/history" target="_blank">History</a>`;
  html += `<a href="${josmUrl}" target="_blank">Open in JOSM</a>`;
  const osmVersion = props.version;
  html += `<button onclick="downloadOsm('${osmType}', ${osmId}, ${osmVersion})">Download .osm</button>`;
  html += `</div>`;

  new maplibregl.Popup()
    .setLngLat(e.lngLat)
    .setHTML(html)
    .addTo(map);
});

// Change cursor on hover — set up when layers are added
const origAddLayer = map.addLayer.bind(map);
map.addLayer = function(layerDef, ...args) {
  origAddLayer(layerDef, ...args);
  const id = layerDef.id;
  if (id.endsWith("-points") || id.endsWith("-lines") || id.endsWith("-polygons")) {
    map.on("mouseenter", id, () => { map.getCanvas().style.cursor = "pointer"; });
    map.on("mouseleave", id, () => { map.getCanvas().style.cursor = ""; });
  }
};

function getFeatureCenter(feature) {
  const geom = feature.geometry;
  if (geom.type === "Point") return geom.coordinates;
  let minX = Infinity, minY = Infinity, maxX = -Infinity, maxY = -Infinity;
  const coords = geom.type === "Polygon" ? geom.coordinates[0] : geom.coordinates;
  for (const c of coords) {
    if (c[0] < minX) minX = c[0];
    if (c[0] > maxX) maxX = c[0];
    if (c[1] < minY) minY = c[1];
    if (c[1] > maxY) maxY = c[1];
  }
  return [(minX + maxX) / 2, (minY + maxY) / 2];
}

function escapeHtml(str) {
  const div = document.createElement("div");
  div.textContent = str;
  return div.innerHTML;
}

const OSM_API = "https://api.openstreetmap.org/api/0.6";

async function downloadOsm(osmType, osmId, version) {
  try {
    const resp = await fetch(`${OSM_API}/${osmType}/${osmId}/${version}`);
    if (!resp.ok) throw new Error(`Failed to fetch ${osmType}/${osmId}/${version}: ${resp.status}`);
    const text = await resp.text();
    const parser = new DOMParser();
    const doc = parser.parseFromString(text, "text/xml");

    // Collect all elements for the final document
    const nodes = new Map();  // id -> XML string
    const ways = new Map();
    const relations = new Map();

    if (osmType === "node") {
      const node = doc.querySelector("node");
      nodes.set(osmId, new XMLSerializer().serializeToString(node));
    } else if (osmType === "way") {
      const way = doc.querySelector("way");
      // Fetch all referenced nodes
      const ndRefs = Array.from(way.querySelectorAll("nd")).map(nd => nd.getAttribute("ref"));
      const nodeResults = await Promise.all(
        ndRefs.map(ref => fetch(`${OSM_API}/node/${ref}`).then(r => r.ok ? r.text() : null))
      );
      for (const nodeText of nodeResults) {
        if (!nodeText) continue;
        const nodeDoc = parser.parseFromString(nodeText, "text/xml");
        const node = nodeDoc.querySelector("node");
        if (node) nodes.set(node.getAttribute("id"), new XMLSerializer().serializeToString(node));
      }
      ways.set(String(osmId), new XMLSerializer().serializeToString(way));
    } else if (osmType === "relation") {
      const rel = doc.querySelector("relation");
      const members = Array.from(rel.querySelectorAll("member"));
      // Fetch member nodes and ways (with their nodes)
      const fetches = members.map(async (member) => {
        const type = member.getAttribute("type");
        const ref = member.getAttribute("ref");
        const r = await fetch(`${OSM_API}/${type}/${ref}`);
        if (!r.ok) return;
        const t = await r.text();
        const d = parser.parseFromString(t, "text/xml");
        if (type === "node") {
          const node = d.querySelector("node");
          if (node) nodes.set(ref, new XMLSerializer().serializeToString(node));
        } else if (type === "way") {
          const way = d.querySelector("way");
          if (!way) return;
          ways.set(ref, new XMLSerializer().serializeToString(way));
          // Fetch the way's nodes too
          const ndRefs = Array.from(way.querySelectorAll("nd")).map(nd => nd.getAttribute("ref"));
          const nodeResults = await Promise.all(
            ndRefs.map(nref => fetch(`${OSM_API}/node/${nref}`).then(nr => nr.ok ? nr.text() : null))
          );
          for (const nodeText of nodeResults) {
            if (!nodeText) continue;
            const nd = parser.parseFromString(nodeText, "text/xml");
            const node = nd.querySelector("node");
            if (node) nodes.set(node.getAttribute("id"), new XMLSerializer().serializeToString(node));
          }
        }
      });
      await Promise.all(fetches);
      relations.set(String(osmId), new XMLSerializer().serializeToString(rel));
    }

    // Build the combined .osm XML
    let xml = '<?xml version="1.0" encoding="UTF-8"?>\n<osm version="0.6" generator="osm-undelete">\n';
    for (const s of nodes.values()) xml += "  " + s + "\n";
    for (const s of ways.values()) xml += "  " + s + "\n";
    for (const s of relations.values()) xml += "  " + s + "\n";
    xml += "</osm>\n";

    const blob = new Blob([xml], { type: "application/xml" });
    const url = URL.createObjectURL(blob);
    const a = document.createElement("a");
    a.href = url;
    a.download = `${osmType}-${osmId}.osm`;
    a.click();
    URL.revokeObjectURL(url);
  } catch (err) {
    alert("Failed to download: " + err.message);
  }
}

</script>
</body>
</html>
